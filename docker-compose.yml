services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: adk
      POSTGRES_PASSWORD: adk
      POSTGRES_DB: adk_sessions
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adk -d adk_sessions"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8080 --reload

volumes:
  postgres_data:
